# Reusable workflow: Publish Docker Image to GHCR
#
# On every merge to main, builds the Docker image and pushes two tags:
#   ghcr.io/<org>/<repo>:sha-<git-sha>   — immutable, used for ECS rollouts
#   ghcr.io/<org>/<repo>:main            — floating, for dev environments (optional)
#
# Requirements in the caller repo:
#   - A Dockerfile must exist (at `dockerfile-path`, default "./Dockerfile").
#   - GITHUB_TOKEN must have `packages: write` permission.
#
# Usage in a caller workflow:
#
#   jobs:
#     publish:
#       uses: alacenas/.github/.github/workflows/publish-image.yml@main
#       with:
#         push-main-tag: true   # optional, default true
#       permissions:
#         contents: read
#         packages: write

name: Publish Image to GHCR

on:
  workflow_call:
    inputs:
      dockerfile-path:
        description: Path to the Dockerfile (relative to repo root)
        type: string
        default: ./Dockerfile
      build-context:
        description: Docker build context path
        type: string
        default: .
      push-main-tag:
        description: Also push the ':main' floating tag in addition to the sha tag
        type: boolean
        default: true
    outputs:
      image:
        description: "Full image reference that was pushed (sha tag)"
        value: ${{ jobs.publish.outputs.image }}

jobs:
  publish:
    name: publish / ghcr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            ${{ inputs.push-main-tag && 'type=raw,value=main' || '' }}

      - name: Build and push image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
